name: ci

on:
  push:
    branches: [main, "release/**", "rc/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: mypy .
      - run: pytest --cov --cov-report=term-missing --cov-report=json:artifacts/coverage.json --cov-fail-under=95
      - if: matrix.python == '3.12'
        run: python scripts/report_coverage_debt.py --coverage artifacts/coverage.json --json-out artifacts/coverage-debt.json
      - if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-debt-python-3.12
          path: |
            artifacts/coverage.json
            artifacts/coverage-debt.json
      - run: node --check static/vendor/katex/katex.min.js
      - run: node --check static/math_core.js
      - run: node --check static/seek_core.js
      - run: node --check static/app.js
      - run: node --check static/theme_boot.js
      - run: node --check static/sw.js
      - run: node --check static/modules/network.js
      - run: node --check static/modules/upload_controller.js
      - run: node --check static/modules/credential_store.js
      - run: node --check static/modules/workspace_tabs.js
      - run: node --check static/modules/markdown.js
      - run: node --check static/modules/settings.js
      - run: node --check static/modules/panels.js
      - run: node --check static/modules/skill_builder.js
      - run: node --check static/modules/skills.js
      - run: node --check static/modules/chat.js
      - run: node --check static/modules/trace_waterfall.js
      - run: node --check static/modules/trace_viewer.js

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run typecheck --prefix frontend
      - run: npm test --prefix frontend
      - run: npm run build --prefix frontend
      - uses: actions/upload-artifact@v4
        with:
          name: react-frontend
          path: static/ui
          if-no-files-found: error

  frontend-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt -r requirements-browser.txt
      - run: python -m playwright install --with-deps chromium
      - run: python scripts/smoke_frontend_browser.py --out docs/evidence/frontend-browser-v4.0.7.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-browser-smoke
          path: docs/evidence/frontend-browser-v4.0.7.json
          if-no-files-found: error

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pip-audit bandit detect-secrets
      - run: npm ci --prefix frontend
      - run: npm audit --prefix frontend --audit-level=high
      - run: pip-audit -r requirements.txt -r requirements-dev.txt -r requirements-browser.txt
      - run: bandit -r deepseek_infra --severity-level high -q
      - run: detect-secrets scan --baseline .secrets.baseline

  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python evals/runners/run_offline_eval_suite.py --include-agent --strict --out evals/reports/latest.json --markdown evals/reports/latest.md
      - run: python evals/runners/run_injection_adversarial.py --strict --no-report
      - run: python evals/runners/run_security_corpus.py --strict --out evals/reports/security-latest.json --markdown evals/reports/security-latest.md
      - run: python evals/runners/compare_eval_baseline.py --strict --baseline evals/baselines/v2.2.6.json --current evals/reports/latest.json --agent-baseline evals/baselines/agent-v2.2.8.json --out evals/reports/baseline-compare-latest.json
      - run: python evals/runners/run_agent_eval.py --report-dir evals/reports --strict
      - run: python evals/runners/run_skill_eval.py --out evals/reports/skills-v4.0.7.json --strict
      - run: python evals/runners/run_media_eval.py --out evals/reports/media-v4.0.7.json --strict
      - run: python evals/runners/run_browser_eval.py --out evals/reports/browser-v4.0.7.json --strict --version 4.0.7
      - run: python evals/runners/run_automation_eval.py --out evals/reports/automation-v4.0.7.json --strict --version 4.0.7
      - uses: actions/upload-artifact@v4
        with:
          name: offline-eval-report
          path: |
            evals/reports/latest.json
            evals/reports/latest.md
            evals/reports/agent-latest.json
            evals/reports/agent-latest.md
            evals/reports/baseline-compare-latest.json
            evals/reports/security-latest.json
            evals/reports/security-latest.md
            evals/reports/skills-v4.0.7.json
            evals/reports/media-v4.0.7.json
            evals/reports/browser-v4.0.7.json
            evals/reports/automation-v4.0.7.json

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t deepseek-infra:test .
      - run: cp .env.example .env && docker compose config

  rust-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Rust sidecar image
        run: docker build -f rust/Dockerfile -t deepseek-rust-gateway:4.0.7 .
      - name: Record Rust sidecar image identity
        run: >-
          python scripts/record_rust_sidecar_image.py
          --tag deepseek-rust-gateway:4.0.7
          --out docs/evidence/rust-sidecar-image-v4.0.7.json
      - name: Run Rust sidecar
        run: docker run --detach --name deepseek-rust-gateway --publish 127.0.0.1:8787:8787 deepseek-rust-gateway:4.0.7
      - name: Smoke test Rust sidecar
        run: python scripts/smoke_rust_sidecar.py --base-url http://127.0.0.1:8787
      - name: Show Rust sidecar logs
        if: failure()
        run: docker logs deepseek-rust-gateway || true
      - name: Upload Rust sidecar image identity
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-sidecar-image
          path: docs/evidence/rust-sidecar-image-v4.0.7.json
          if-no-files-found: error
      - name: Stop Rust sidecar
        if: always()
        run: docker rm --force deepseek-rust-gateway || true

  hybrid-runtime-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and start hybrid runtime
        run: |
          cp .env.example .env
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.hybrid-test.yml \
            up --detach --build
      - name: Run hybrid runtime smoke tests
        run: python scripts/smoke_hybrid_runtime.py --json > docs/evidence/hybrid-runtime-e2e-v4.0.7.json
      - name: Upload hybrid runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-runtime-e2e
          path: docs/evidence/hybrid-runtime-e2e-v4.0.7.json
          if-no-files-found: error
      - name: Show hybrid runtime logs
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.hybrid-test.yml \
            logs --no-color || true
      - name: Stop hybrid runtime
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.hybrid-test.yml \
            down --volumes --remove-orphans || true

  rag-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Rust sidecar image for RAG parity
        run: docker build -f rust/Dockerfile -t deepseek-rust-gateway:parity .
      - name: Start Rust sidecar for RAG parity
        run: |
          docker run --detach \
            --name deepseek-rust-rag-parity \
            --publish 127.0.0.1:8787:8787 \
            deepseek-rust-gateway:parity
      - name: Run deterministic RAG parity corpus
        run: |
          python scripts/check_rag_parity.py \
            --base-url http://127.0.0.1:8787 \
            --strict \
            --report docs/evidence/rag-parity-v4.0.7.json
      - name: Show Rust RAG parity logs
        if: failure()
        run: docker logs deepseek-rust-rag-parity || true
      - name: Upload RAG parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-parity-report
          path: docs/evidence/rag-parity-v4.0.7.json
          if-no-files-found: warn
      - name: Stop Rust RAG parity sidecar
        if: always()
        run: docker rm --force deepseek-rust-rag-parity || true

  rag-vector-binary-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build release Rust sidecar for binary vector parity
        run: docker build -f rust/Dockerfile -t deepseek-rust-gateway:rag-vector-binary-parity .
      - name: Start Rust sidecar for binary vector parity
        run: |
          docker run --detach \
            --name deepseek-rust-rag-vector-binary-parity \
            --publish 127.0.0.1:8787:8787 \
            deepseek-rust-gateway:rag-vector-binary-parity
      - name: Run deterministic compact binary parity corpus
        run: |
          python scripts/check_rag_vector_binary_parity.py \
            --base-url http://127.0.0.1:8787 \
            --strict \
            --report docs/evidence/rag-vector-binary-parity-v4.0.7.json
      - name: Show Rust binary vector parity logs
        if: failure()
        run: docker logs deepseek-rust-rag-vector-binary-parity || true
      - name: Upload binary vector parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-vector-binary-parity
          path: docs/evidence/rag-vector-binary-parity-v4.0.7.json
          if-no-files-found: error
      - name: Stop Rust binary vector parity sidecar
        if: always()
        run: docker rm --force deepseek-rust-rag-vector-binary-parity || true

  gateway-request-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Rust sidecar image for Gateway request parity
        run: docker build -f rust/Dockerfile -t deepseek-rust-gateway:request-parity .
      - name: Start Rust sidecar for Gateway request parity
        run: |
          docker run --detach \
            --name deepseek-rust-gateway-request-parity \
            --publish 127.0.0.1:8787:8787 \
            deepseek-rust-gateway:request-parity
      - name: Run deterministic Gateway request parity corpus
        run: |
          python scripts/check_gateway_request_parity.py \
            --base-url http://127.0.0.1:8787 \
            --strict \
            --report docs/evidence/gateway-request-parity-v4.0.7.json
      - name: Show Rust Gateway request parity logs
        if: failure()
        run: docker logs deepseek-rust-gateway-request-parity || true
      - name: Upload Gateway request parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-request-parity-report
          path: docs/evidence/gateway-request-parity-v4.0.7.json
          if-no-files-found: warn
      - name: Stop Rust Gateway request parity sidecar
        if: always()
        run: docker rm --force deepseek-rust-gateway-request-parity || true

  mcp-protocol-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Rust sidecar image for MCP protocol parity
        run: docker build -f rust/Dockerfile -t deepseek-rust-gateway:mcp-protocol-parity .
      - name: Start Rust sidecar for MCP protocol parity
        run: |
          docker run --detach \
            --name deepseek-rust-mcp-protocol-parity \
            --publish 127.0.0.1:8787:8787 \
            deepseek-rust-gateway:mcp-protocol-parity
      - name: Run deterministic MCP protocol parity corpus
        run: |
          python scripts/check_mcp_protocol_parity.py \
            --base-url http://127.0.0.1:8787 \
            --strict \
            --report docs/evidence/mcp-protocol-parity-v4.0.7.json
      - name: Show Rust MCP protocol parity logs
        if: failure()
        run: docker logs deepseek-rust-mcp-protocol-parity || true
      - name: Upload MCP protocol parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-protocol-parity-report
          path: docs/evidence/mcp-protocol-parity-v4.0.7.json
          if-no-files-found: warn
      - name: Stop Rust MCP protocol parity sidecar
        if: always()
        run: docker rm --force deepseek-rust-mcp-protocol-parity || true

  rag-document-preparation-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Rust sidecar image for RAG document preparation parity
        run: docker build -f rust/Dockerfile -t deepseek-rust-gateway:rag-document-preparation-parity .
      - name: Start Rust sidecar for RAG document preparation parity
        run: |
          docker run --detach \
            --name deepseek-rust-rag-document-preparation-parity \
            --publish 127.0.0.1:8787:8787 \
            deepseek-rust-gateway:rag-document-preparation-parity
      - name: Run deterministic RAG document preparation parity corpus
        run: |
          python scripts/check_rag_document_preparation_parity.py \
            --base-url http://127.0.0.1:8787 \
            --strict \
            --report docs/evidence/rag-document-preparation-parity-v4.0.7.json
      - name: Show Rust RAG document preparation parity logs
        if: failure()
        run: docker logs deepseek-rust-rag-document-preparation-parity || true
      - name: Upload RAG document preparation parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-document-preparation-parity-report
          path: docs/evidence/rag-document-preparation-parity-v4.0.7.json
          if-no-files-found: warn
      - name: Stop Rust RAG document preparation parity sidecar
        if: always()
        run: docker rm --force deepseek-rust-rag-document-preparation-parity || true

  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python scripts/smoke_mcp_headless_bridge.py --out docs/evidence/headless-mcp-bridge.json
      - run: python scripts/smoke_a2a_external_peer.py --out docs/evidence/a2a-external-peer.json
      - run: python scripts/smoke_ga.py --offline --out docs/evidence/ga-v4.0.7.json
      - run: python scripts/smoke_workspace.py --offline --out docs/evidence/workspace-v4.0.7.json
      - run: python scripts/smoke_edge_router.py --offline --out docs/evidence/edge-router-v4.0.7.json
      - run: python scripts/smoke_media.py --offline --out docs/evidence/media-v4.0.7.json
      - run: python scripts/smoke_browser.py --offline --out docs/evidence/browser-v4.0.7.json --version 4.0.7
      - run: python scripts/smoke_automation.py --offline --out docs/evidence/automation-v4.0.7.json --version 4.0.7
      - run: python scripts/smoke_skills.py --offline --out docs/evidence/skills-v4.0.7.json
      - run: python scripts/smoke_skills_ui.py --offline --out docs/evidence/skills-ui-v4.0.7.json
      - run: python scripts/smoke_skill_builder.py --offline --out docs/evidence/skill-builder-v4.0.7.json
      - run: python scripts/smoke_skill_packs.py --offline --out docs/evidence/skill-packs-v4.0.7.json
      - run: python scripts/smoke_skill_eval_dashboard.py --offline --out docs/evidence/skill-eval-dashboard-v4.0.7.json --report-out evals/reports/skills-v4.0.7.json
      - run: python scripts/smoke_skill_versioning.py --offline --out docs/evidence/skill-versioning-v4.0.7.json
      - run: python scripts/smoke_skill_analytics.py --offline --out docs/evidence/skill-analytics-v4.0.7.json
      - run: python scripts/smoke_skill_security.py --offline --out docs/evidence/skill-security-v4.0.7.json
      - run: python scripts/smoke_skill_catalog.py --offline --out docs/evidence/skill-catalog-v4.0.7.json
      - run: python scripts/smoke_context_taint.py --offline --out docs/evidence/context-taint-v4.0.7.json
      - run: python scripts/generate_4_0_contract_evidence.py --kind upgrade --out docs/evidence/upgrade-rollback-v4.0.7.json
      - run: python scripts/generate_4_0_contract_evidence.py --kind protocol --out docs/evidence/protocol-contract-v4.0.7.json
      - run: python scripts/preflight_release.py --version 4.0.7 --ga
      - run: python scripts/doctor.py --offline
      - run: python scripts/release.py --clean-workspace --dry-run

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/update_docs_language_nav.py --check
      - run: python scripts/check_doc_links.py

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
      - run: cargo fmt --manifest-path rust/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path rust/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --manifest-path rust/Cargo.toml --all

  rust-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: llvm-tools-preview
      - run: cargo install cargo-llvm-cov --locked --version 0.6.21
      - name: Enforce Rust workspace line coverage
        run: >-
          python scripts/run_rust_coverage.py
          --threshold 80
          --artifact-out artifacts/rust-coverage.json
          --lcov-out artifacts/rust-coverage.lcov
          --evidence-out docs/evidence/rust-coverage-v4.0.7.json
      - name: Upload Rust coverage evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: |
            artifacts/rust-coverage.json
            artifacts/rust-coverage.lcov
            docs/evidence/rust-coverage-v4.0.7.json
          if-no-files-found: error

  rust-sidecar-performance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@1.85.0
      - run: python -m pip install -r requirements.txt
      - name: Build locked release sidecar
        run: cargo build --release --locked --manifest-path rust/Cargo.toml -p deepseek-gateway
      - name: Run bounded layered benchmark
        run: >-
          python scripts/run_rust_sidecar_benchmarks.py
          --skip-build
          --iterations 2
          --warmups 1
          --concurrency 1,8,32
          --timeout 45
          --artifact-out artifacts/rust-sidecar-performance.json
          --evidence-out docs/evidence/rust-sidecar-performance-v4.0.7.json
      - name: Upload informational performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-sidecar-performance
          path: |
            artifacts/rust-sidecar-performance.json
            docs/evidence/rust-sidecar-performance-v4.0.7.json
          if-no-files-found: error

  rc-readiness:
    if: always()
    needs:
      - test
      - frontend
      - frontend-browser
      - security
      - eval
      - docker
      - rust-docker
      - hybrid-runtime-e2e
      - gateway-request-parity
      - mcp-protocol-parity
      - rag-parity
      - rag-vector-binary-parity
      - rag-document-preparation-parity
      - release-readiness
      - docs
      - rust
      - rust-coverage
      - rust-sidecar-performance
    runs-on: ubuntu-latest
    env:
      RC_CI_TEST: ${{ needs.test.result }}
      RC_CI_FRONTEND: ${{ needs.frontend.result }}
      RC_CI_FRONTEND_BROWSER: ${{ needs['frontend-browser'].result }}
      RC_CI_SECURITY: ${{ needs.security.result }}
      RC_CI_EVAL: ${{ needs.eval.result }}
      RC_CI_DOCKER: ${{ needs.docker.result }}
      RC_CI_RUST_DOCKER: ${{ needs['rust-docker'].result }}
      RC_CI_HYBRID_RUNTIME_E2E: ${{ needs['hybrid-runtime-e2e'].result }}
      RC_CI_GATEWAY_REQUEST_PARITY: ${{ needs['gateway-request-parity'].result }}
      RC_CI_MCP_PROTOCOL_PARITY: ${{ needs['mcp-protocol-parity'].result }}
      RC_CI_RAG_PARITY: ${{ needs['rag-parity'].result }}
      RC_CI_RAG_VECTOR_BINARY_PARITY: ${{ needs['rag-vector-binary-parity'].result }}
      RC_CI_RAG_DOCUMENT_PREPARATION_PARITY: ${{ needs['rag-document-preparation-parity'].result }}
      RC_CI_RELEASE_READINESS: ${{ needs['release-readiness'].result }}
      RC_CI_DOCS: ${{ needs.docs.result }}
      RC_CI_RUST: ${{ needs.rust.result }}
      RC_CI_RUST_COVERAGE: ${{ needs['rust-coverage'].result }}
      RC_CI_RUST_SIDECAR_PERFORMANCE: ${{ needs['rust-sidecar-performance'].result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check 4.0 RC readiness
        shell: bash
        run: |
          test "$RC_CI_FRONTEND" = "success"
          mode=--report-only
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          case "$branch" in
            release/*|rc/*) mode=--strict ;;
          esac
          python scripts/check_4_0_rc_readiness.py \
            --requirements release/4_0_rc_requirements.json \
            --json-out artifacts/4-0-rc-readiness.json \
            "$mode"
      - name: Upload 4.0 RC readiness report
