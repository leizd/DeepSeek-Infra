name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: mypy .
      # 实测覆盖率 78%（2.1.7），门禁 75 留 3 点余量；路线 v2.3→78 / v2.4→80
      - run: pytest --cov --cov-fail-under=75
      - run: node --check static/vendor/katex/katex.min.js
      - run: node --check static/math_core.js
      - run: node --check static/seek_core.js
      - run: node --check static/app.js
      - run: node --check static/modules/network.js
      - run: node --check static/modules/markdown.js
      - run: node --check static/modules/settings.js
      - run: node --check static/modules/panels.js
      - run: node --check static/modules/chat.js

  evals:
    # 质量门禁：RAG 召回与工具安全闸门的离线回归（无需任何 API Key）。
    # 证明 RAG 检索与注入防御不是只靠单测——错判 / 召回跌破阈值即红。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python evals/runners/run_tool_eval.py --no-report
      - run: python evals/runners/run_rag_eval.py --no-report --fail-under-recall 0.99

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pip-audit bandit detect-secrets
      # 依赖 CVE 审计：运行 + 开发依赖的解析结果
      - run: pip-audit -r requirements.txt -r requirements-dev.txt
      # 静态安全分析：高危基线保持清零（medium 为已审阅类别，见 docs/THREAT_MODEL.md）
      - run: bandit -r deepseek_infra --severity-level high -q
      # 凭证扫描：只允许 .secrets.baseline 里已审阅的测试夹具假密钥
      - run: detect-secrets scan --baseline .secrets.baseline
