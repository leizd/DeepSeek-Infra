  release-readiness:
    needs: evidence-context
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_EVIDENCE_SOURCE_CONTEXT: ${{ github.workspace }}/artifacts/evidence-context/evidence-source-context.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: evidence-source-context
          path: artifacts/evidence-context
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt -r requirements-browser.txt
      - run: python -m playwright install --with-deps chromium
      - run: python scripts/generate_release_evidence.py --version 4.3.4
      - run: python scripts/doctor.py --offline
      - run: >-
          python scripts/prepare_evidence_artifact.py
          --producer release-readiness
          --version 4.3.4
          --context "$EVIDENCE_CONTEXT_PATH"
          --out artifacts/evidence-producer-release-readiness
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-producer-release-readiness
          path: artifacts/evidence-producer-release-readiness
          if-no-files-found: error

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/update_docs_language_nav.py --check
      - run: python scripts/check_doc_links.py

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
      - run: cargo fmt --manifest-path rust/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path rust/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --manifest-path rust/Cargo.toml --all

  rust-coverage:
    needs: evidence-context
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_EVIDENCE_SOURCE_CONTEXT: ${{ github.workspace }}/artifacts/evidence-context/evidence-source-context.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: evidence-source-context
          path: artifacts/evidence-context
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: llvm-tools-preview
      - run: cargo install cargo-llvm-cov --locked --version 0.6.21
      - name: Enforce Rust workspace line coverage
        run: >-
          python scripts/run_rust_coverage.py
          --threshold 80
          --artifact-out artifacts/rust-coverage.json
          --lcov-out artifacts/rust-coverage.lcov
          --evidence-out docs/evidence/rust-coverage-v4.3.4.json
      - run: >-
          python scripts/prepare_evidence_artifact.py
          --producer rust-coverage
          --version 4.3.4
          --context "$EVIDENCE_CONTEXT_PATH"
          --out artifacts/evidence-producer-rust-coverage
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-producer-rust-coverage
          path: artifacts/evidence-producer-rust-coverage
          if-no-files-found: error
      - name: Upload Rust coverage evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: |
            artifacts/rust-coverage.json
            artifacts/rust-coverage.lcov
            docs/evidence/rust-coverage-v4.3.4.json
          if-no-files-found: error

  rust-sidecar-performance:
    needs: evidence-context
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_EVIDENCE_SOURCE_CONTEXT: ${{ github.workspace }}/artifacts/evidence-context/evidence-source-context.json
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: evidence-source-context
          path: artifacts/evidence-context
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@1.85.0
      - run: python -m pip install -r requirements.txt
      - name: Build locked release sidecar
        run: cargo build --release --locked --manifest-path rust/Cargo.toml -p deepseek-gateway
      - name: Run bounded layered benchmark
        run: >-
          python scripts/run_rust_sidecar_benchmarks.py
          --skip-build
          --iterations 2
          --warmups 1
          --concurrency 1,8,32
          --timeout 45
          --artifact-out artifacts/rust-sidecar-performance.json
          --evidence-out docs/evidence/rust-sidecar-performance-v4.3.4.json
      - run: >-
          python scripts/prepare_evidence_artifact.py
          --producer rust-sidecar-performance
          --version 4.3.4
          --context "$EVIDENCE_CONTEXT_PATH"
          --out artifacts/evidence-producer-rust-sidecar-performance
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-producer-rust-sidecar-performance
          path: artifacts/evidence-producer-rust-sidecar-performance
          if-no-files-found: error
      - name: Upload informational performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-sidecar-performance
          path: |
            artifacts/rust-sidecar-performance.json
            docs/evidence/rust-sidecar-performance-v4.3.4.json
          if-no-files-found: error

  evidence-assembly:
    if: always()
    needs:
      - evidence-context
      - frontend
      - frontend-browser
      - security
      - eval
      - release-readiness
      - rust-docker
      - hybrid-runtime-e2e
      - gateway-request-parity
      - mcp-protocol-parity
      - rag-parity
      - rag-document-preparation-parity
      - rag-vector-binary-parity
      - rust-coverage
      - rust-sidecar-performance
    runs-on: ubuntu-latest
    steps:
      - name: Require every upstream Evidence gate
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: exit 1
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: evidence-source-context
          path: artifacts/evidence-context
      - uses: actions/download-artifact@v4
        with:
          pattern: evidence-producer-*
          path: artifacts/downloaded
          merge-multiple: false
      - name: Assemble exact-merge Evidence
        run: >-
          python scripts/assemble_release_evidence.py
          --downloads-root artifacts/downloaded
          --context "$EVIDENCE_CONTEXT_PATH"
          --version 4.3.4
          --github-sha "$GITHUB_SHA"
          --out release-evidence
      - uses: actions/upload-artifact@v4
        with:
          name: release-evidence-v4.3.4
          path: release-evidence
          if-no-files-found: error

  release-package:
    needs:
      - evidence-assembly
      - evidence-context
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/download-artifact@v4
        with:
          name: release-evidence-v4.3.4
          path: artifacts/release-evidence
      - uses: actions/download-artifact@v4
        with:
          name: evidence-source-context
          path: artifacts/evidence-context
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
      - name: Restore assembled Evidence into package staging tree
        run: |
          cp -R artifacts/release-evidence/docs/evidence/. docs/evidence/
          cp -R artifacts/release-evidence/evals/reports/. evals/reports/
      - name: Run strict exact-merge preflight
        run: >-
          python scripts/preflight_release.py
          --version 4.3.4
          --ga
          --provenance-strict
          --expected-revision "$GITHUB_SHA"
          --json > artifacts/preflight-v4.3.4.json
      - name: Build real release ZIP and manifests
        run: >-
          python scripts/release.py
          --version 4.3.4
          --skip-frontend-build
      - name: Reverify packaged Evidence bytes
        run: >-
          python scripts/verify_release_package.py
          --archive dist/deepseek-infra-4.3.4.zip
          --release-manifest dist/deepseek-infra-4.3.4.zip.manifest.json
          --evidence-root artifacts/release-evidence
          --version 4.3.4
          --expected-revision "$GITHUB_SHA"
          --out artifacts/preflight-v4.3.4.json
      - uses: actions/upload-artifact@v4
        with:
          name: deepseek-infra-release-v4.3.4
          path: |
            dist/deepseek-infra-4.3.4.zip
            dist/deepseek-infra-4.3.4.zip.sha256
            dist/deepseek-infra-4.3.4.zip.manifest.json
            artifacts/preflight-v4.3.4.json
          if-no-files-found: error

  rc-readiness:
    if: always()
    needs:
      - test
      - frontend
      - frontend-browser
      - security
      - eval
      - docker
      - rust-docker
      - hybrid-runtime-e2e
      - gateway-request-parity
      - mcp-protocol-parity
      - rag-parity
      - rag-vector-binary-parity
      - rag-document-preparation-parity
      - release-readiness
      - docs
      - rust
      - rust-coverage
      - rust-sidecar-performance
      - evidence-assembly
      - release-package
    runs-on: ubuntu-latest
    env:
      RC_CI_TEST: ${{ needs.test.result }}
      RC_CI_FRONTEND: ${{ needs.frontend.result }}
      RC_CI_FRONTEND_BROWSER: ${{ needs['frontend-browser'].result }}
      RC_CI_SECURITY: ${{ needs.security.result }}
      RC_CI_EVAL: ${{ needs.eval.result }}
      RC_CI_DOCKER: ${{ needs.docker.result }}
      RC_CI_RUST_DOCKER: ${{ needs['rust-docker'].result }}
      RC_CI_HYBRID_RUNTIME_E2E: ${{ needs['hybrid-runtime-e2e'].result }}
      RC_CI_GATEWAY_REQUEST_PARITY: ${{ needs['gateway-request-parity'].result }}
      RC_CI_MCP_PROTOCOL_PARITY: ${{ needs['mcp-protocol-parity'].result }}
      RC_CI_RAG_PARITY: ${{ needs['rag-parity'].result }}
      RC_CI_RAG_VECTOR_BINARY_PARITY: ${{ needs['rag-vector-binary-parity'].result }}
      RC_CI_RAG_DOCUMENT_PREPARATION_PARITY: ${{ needs['rag-document-preparation-parity'].result }}
      RC_CI_RELEASE_READINESS: ${{ needs['release-readiness'].result }}
      RC_CI_DOCS: ${{ needs.docs.result }}
      RC_CI_RUST: ${{ needs.rust.result }}
      RC_CI_RUST_COVERAGE: ${{ needs['rust-coverage'].result }}
      RC_CI_RUST_SIDECAR_PERFORMANCE: ${{ needs['rust-sidecar-performance'].result }}
      RC_CI_EVIDENCE_ASSEMBLY: ${{ needs['evidence-assembly'].result }}
      RC_CI_RELEASE_PACKAGE: ${{ needs['release-package'].result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check 4.0 RC readiness
        shell: bash
        run: |
          test "$RC_CI_FRONTEND" = "success"
          test "$RC_CI_EVIDENCE_ASSEMBLY" = "success"
          test "$RC_CI_RELEASE_PACKAGE" = "success"
          mode=--report-only
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          case "$branch" in
            release/*|rc/*) mode=--strict ;;
          esac
          python scripts/check_4_0_rc_readiness.py \
            --requirements release/4_0_rc_requirements.json \
            --json-out artifacts/4-0-rc-readiness.json \
            "$mode"
      - name: Upload 4.0 RC readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 4-0-rc-readiness
          path: artifacts/4-0-rc-readiness.json
          if-no-files-found: error
