name: ci

on:
  push:
    branches: [main, "release/**", "rc/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  EVIDENCE_CONTEXT_PATH: artifacts/evidence-context/evidence-source-context.json

jobs:
  evidence-context:
    runs-on: ubuntu-latest
    outputs:
      tested-revision: ${{ steps.context.outputs.revision }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: context
        name: Capture exact-merge Evidence context
        run: >-
          python scripts/capture_evidence_context.py
          --version 4.3.4
          --out "$EVIDENCE_CONTEXT_PATH"
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-source-context
          path: ${{ env.EVIDENCE_CONTEXT_PATH }}
          if-no-files-found: error

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
      - run: ruff check .
      - run: mypy .
      - run: pytest --cov --cov-report=term-missing --cov-report=json:artifacts/coverage.json --cov-fail-under=95
      - if: matrix.python == '3.12'
        run: python scripts/report_coverage_debt.py --coverage artifacts/coverage.json --json-out artifacts/coverage-debt.json
      - if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-debt-python-3.12
          path: |
            artifacts/coverage.json
            artifacts/coverage-debt.json
      - run: node --check static/vendor/katex/katex.min.js

  frontend:
    needs: evidence-context
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_EVIDENCE_SOURCE_CONTEXT: ${{ github.workspace }}/artifacts/evidence-context/evidence-source-context.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: evidence-source-context
          path: artifacts/evidence-context
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run typecheck --prefix frontend
      - run: npm test --prefix frontend
      - run: npm run build --prefix frontend
      - run: python scripts/check_frontend_bundle.py --out docs/evidence/frontend-bundle-v4.3.4.json
      - run: >-
          python scripts/prepare_evidence_artifact.py
          --producer frontend
          --version 4.3.4
          --context "$EVIDENCE_CONTEXT_PATH"
          --out artifacts/evidence-producer-frontend
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-producer-frontend
          path: artifacts/evidence-producer-frontend
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: react-frontend
          path: |
            static/ui
            docs/evidence/frontend-bundle-v4.3.4.json
          if-no-files-found: error

  frontend-browser:
    needs: evidence-context
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_EVIDENCE_SOURCE_CONTEXT: ${{ github.workspace }}/artifacts/evidence-context/evidence-source-context.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: evidence-source-context
          path: artifacts/evidence-context
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt -r requirements-browser.txt
      - run: python -m playwright install --with-deps chromium
      - run: python scripts/smoke_frontend_browser.py --out docs/evidence/frontend-browser-v4.3.4.json
      - run: >-
          python scripts/prepare_evidence_artifact.py
          --producer frontend-browser
          --version 4.3.4
          --context "$EVIDENCE_CONTEXT_PATH"
          --out artifacts/evidence-producer-frontend-browser
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-producer-frontend-browser
          path: artifacts/evidence-producer-frontend-browser
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-browser-smoke
          path: docs/evidence/frontend-browser-v4.3.4.json
          if-no-files-found: error

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pip-audit bandit detect-secrets
      - run: npm ci --prefix frontend
      - run: npm audit --prefix frontend --audit-level=high
      - run: pip-audit -r requirements.txt -r requirements-dev.txt -r requirements-browser.txt
      - run: bandit -r deepseek_infra --severity-level high -q
      - run: detect-secrets scan --baseline .secrets.baseline

  eval:
    needs: evidence-context
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_EVIDENCE_SOURCE_CONTEXT: ${{ github.workspace }}/artifacts/evidence-context/evidence-source-context.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: evidence-source-context
          path: artifacts/evidence-context
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python evals/runners/run_offline_eval_suite.py --include-agent --strict --out evals/reports/latest.json --markdown evals/reports/latest.md
      - run: python evals/runners/run_injection_adversarial.py --strict --no-report
      - run: python evals/runners/run_security_corpus.py --strict --out evals/reports/security-latest.json --markdown evals/reports/security-latest.md
      - run: python evals/runners/compare_eval_baseline.py --strict --baseline evals/baselines/v2.2.6.json --current evals/reports/latest.json --agent-baseline evals/baselines/agent-v2.2.8.json --out evals/reports/baseline-compare-latest.json
      - run: python evals/runners/run_agent_eval.py --report-dir evals/reports --strict
      - run: python evals/runners/run_skill_eval.py --out evals/reports/skills-v4.3.4.json --strict
      - run: python evals/runners/run_media_eval.py --out evals/reports/media-v4.3.4.json --strict
      - run: python evals/runners/run_browser_eval.py --out evals/reports/browser-v4.3.4.json --strict --version 4.3.4
      - run: python evals/runners/run_automation_eval.py --out evals/reports/automation-v4.3.4.json --strict --version 4.3.4
      - run: >-
          python scripts/prepare_evidence_artifact.py
          --producer eval
          --version 4.3.4
          --context "$EVIDENCE_CONTEXT_PATH"
          --out artifacts/evidence-producer-eval
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-producer-eval
          path: artifacts/evidence-producer-eval
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: offline-eval-report
          path: |
            evals/reports/latest.json
            evals/reports/latest.md
            evals/reports/agent-latest.json
            evals/reports/agent-latest.md
            evals/reports/baseline-compare-latest.json
            evals/reports/security-latest.json
            evals/reports/security-latest.md
            evals/reports/skills-v4.3.4.json
            evals/reports/media-v4.3.4.json
            evals/reports/browser-v4.3.4.json
            evals/reports/automation-v4.3.4.json

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t deepseek-infra:test .
      - run: cp .env.example .env && docker compose config

  rust-docker:
    needs: evidence-context
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_EVIDENCE_SOURCE_CONTEXT: ${{ github.workspace }}/artifacts/evidence-context/evidence-source-context.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: evidence-source-context
          path: artifacts/evidence-context
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Rust sidecar image
        run: docker build -f rust/Dockerfile -t deepseek-rust-gateway:4.3.4 .
      - name: Record Rust sidecar image identity
        run: >-
          python scripts/record_rust_sidecar_image.py
          --tag deepseek-rust-gateway:4.3.4
          --out docs/evidence/rust-sidecar-image-v4.3.4.json
      - name: Run Rust sidecar
        run: docker run --detach --name deepseek-rust-gateway --publish 127.0.0.1:8787:8787 deepseek-rust-gateway:4.3.4
      - name: Smoke test Rust sidecar
        run: python scripts/smoke_rust_sidecar.py --base-url http://127.0.0.1:8787
      - run: >-
          python scripts/prepare_evidence_artifact.py
          --producer rust-docker
          --version 4.3.4
          --context "$EVIDENCE_CONTEXT_PATH"
          --out artifacts/evidence-producer-rust-docker
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-producer-rust-docker
          path: artifacts/evidence-producer-rust-docker
          if-no-files-found: error
      - name: Show Rust sidecar logs
        if: failure()
        run: docker logs deepseek-rust-gateway || true
      - name: Upload Rust sidecar image identity
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-sidecar-image
          path: docs/evidence/rust-sidecar-image-v4.3.4.json
          if-no-files-found: error
      - name: Stop Rust sidecar
        if: always()
        run: docker rm --force deepseek-rust-gateway || true

  hybrid-runtime-e2e:
    needs: evidence-context
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_EVIDENCE_SOURCE_CONTEXT: ${{ github.workspace }}/artifacts/evidence-context/evidence-source-context.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: evidence-source-context
          path: artifacts/evidence-context
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and start hybrid runtime
        run: |
          cp .env.example .env
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.hybrid-test.yml \
            up --detach --build
      - name: Run hybrid runtime smoke tests
        run: python scripts/smoke_hybrid_runtime.py --json > docs/evidence/hybrid-runtime-e2e-v4.3.4.json
      - run: >-
          python scripts/prepare_evidence_artifact.py
          --producer hybrid-runtime-e2e
          --version 4.3.4
          --context "$EVIDENCE_CONTEXT_PATH"
          --out artifacts/evidence-producer-hybrid-runtime-e2e
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-producer-hybrid-runtime-e2e
          path: artifacts/evidence-producer-hybrid-runtime-e2e
          if-no-files-found: error
      - name: Upload hybrid runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-runtime-e2e
          path: docs/evidence/hybrid-runtime-e2e-v4.3.4.json
          if-no-files-found: error
      - name: Show hybrid runtime logs
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.hybrid-test.yml \
            logs --no-color || true
      - name: Stop hybrid runtime
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.hybrid-test.yml \
            down --volumes --remove-orphans || true

  rag-parity:
    needs: evidence-context
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_EVIDENCE_SOURCE_CONTEXT: ${{ github.workspace }}/artifacts/evidence-context/evidence-source-context.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: evidence-source-context
          path: artifacts/evidence-context
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Rust sidecar image for RAG parity
        run: docker build -f rust/Dockerfile -t deepseek-rust-gateway:parity .
      - name: Start Rust sidecar for RAG parity
        run: |
          docker run --detach \
            --name deepseek-rust-rag-parity \
            --publish 127.0.0.1:8787:8787 \
            deepseek-rust-gateway:parity
      - name: Run deterministic RAG parity corpus
        run: |
          python scripts/check_rag_parity.py \
            --base-url http://127.0.0.1:8787 \
            --strict \
            --report docs/evidence/rag-parity-v4.3.4.json
      - run: >-
          python scripts/prepare_evidence_artifact.py
          --producer rag-parity
          --version 4.3.4
          --context "$EVIDENCE_CONTEXT_PATH"
          --out artifacts/evidence-producer-rag-parity
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-producer-rag-parity
          path: artifacts/evidence-producer-rag-parity
          if-no-files-found: error
      - name: Show Rust RAG parity logs
        if: failure()
        run: docker logs deepseek-rust-rag-parity || true
      - name: Upload RAG parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-parity-report
          path: docs/evidence/rag-parity-v4.3.4.json
          if-no-files-found: warn
      - name: Stop Rust RAG parity sidecar
        if: always()
        run: docker rm --force deepseek-rust-rag-parity || true

