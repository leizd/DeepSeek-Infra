<svg viewBox="0 0 1200 850" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="rust-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- self-contained light card: readable on both GitHub light & dark themes -->
  <rect x="0" y="0" width="1200" height="850" rx="18" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="1199" height="849" rx="18" fill="none" stroke="#dbe3ee"/>

  <!-- header -->
  <text x="48" y="58" font-size="26" font-weight="700" fill="#0f172a">DeepSeek Infra</text>
  <text x="48" y="84" font-size="14" fill="#64748b">本地优先的 Agentic AI 基础设施平台 — LLM 网关 · Agent DAG · MCP · A2A · 本地 RAG · 可观测性</text>
  <rect x="1070" y="38" width="82" height="28" rx="14" fill="#2563eb"/>
  <text x="1111" y="57" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">v4.2.2</text>

  <!-- clients layer -->
  <rect x="48" y="110" width="1104" height="74" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="64" y="128" font-size="10" letter-spacing="2" fill="#94a3b8">客户端 · REACT 前端</text>
  <g font-size="11.5" fill="#334155" text-anchor="middle">
    <rect x="64" y="136" width="142" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="135" y="158">React 应用 · /</text>
    <rect x="216" y="136" width="150" height="34" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="291" y="158" fill="#1d4ed8" font-weight="600">React 别名 · /ui/</text>
    <rect x="376" y="136" width="146" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="449" y="158">桌面 WebView</text>
    <rect x="532" y="136" width="128" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="596" y="158">Android APK</text>
    <rect x="670" y="136" width="150" height="34" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="745" y="158" fill="#1d4ed8">OpenAI SDK → /v1</text>
    <rect x="830" y="136" width="144" height="34" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="902" y="158" fill="#1d4ed8">MCP 客户端 → /mcp</text>
    <rect x="984" y="136" width="152" height="34" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="1060" y="158" fill="#1d4ed8">A2A 节点 → /a2a</text>
  </g>

  <!-- arrow clients -> runtime -->
  <line x1="600" y1="184" x2="600" y2="206" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="616" y="200" font-size="11" fill="#94a3b8">HTTP · SSE · 流式传输 · JSON-RPC 2.0</text>

  <!-- python default runtime -->
  <rect x="48" y="210" width="760" height="300" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="48" y="210" width="6" height="300" rx="3" fill="#2563eb"/>
  <text x="72" y="240" font-size="18" font-weight="700" fill="#1e40af">Python 默认运行时</text>
  <text x="72" y="262" font-size="12" fill="#3b82f6">FastAPI / ASGI — 默认部署：仅 Python</text>
  <g font-size="12" fill="#1e3a8a">
    <text x="72" y="288">• 身份认证</text>
    <text x="72" y="310">• HTTP / SSE / 流式传输</text>
    <text x="72" y="332">• 模型供应商路由</text>
    <text x="72" y="354">• 重试 / 退避</text>
    <text x="72" y="376">• Agent DAG 编排</text>
    <text x="72" y="398">• MCP 传输与会话</text>
    <text x="420" y="288">• 真实工具执行</text>
    <text x="420" y="310">• 文件解析与 OCR</text>
    <text x="420" y="332">• 向量嵌入</text>
    <text x="420" y="354">• 持久化与索引</text>
    <text x="420" y="376">• 可观测性与业务状态</text>
    <text x="420" y="398">• 经典 + React 前端服务</text>
  </g>

  <!-- optional rust sidecar -->
  <rect x="832" y="210" width="320" height="300" rx="12" fill="#fff7ed" stroke="#f59e0b" stroke-dasharray="6 4"/>
  <rect x="832" y="210" width="6" height="300" rx="3" fill="#f59e0b"/>
  <text x="856" y="240" font-size="17" font-weight="700" fill="#92400e">可选 Rust 旁车</text>
  <text x="856" y="262" font-size="10" fill="#d97706">默认关闭 · 按需委派 · Python 回退</text>
  <g font-size="11" fill="#78350f">
    <text x="856" y="292" font-weight="600">网关请求预处理</text>
    <text x="856" y="306" fill="#b45309">POST /gateway/request/prepare</text>
    <text x="856" y="328" font-weight="600">MCP 协议预处理</text>
    <text x="856" y="342" fill="#b45309">POST /mcp/request/prepare</text>
    <text x="856" y="364" font-weight="600">工具策略评估</text>
    <text x="856" y="378" fill="#b45309">POST /policy/{url,path,capability}</text>
    <text x="856" y="400" font-weight="600">RAG 向量排序 · JSON / 紧凑二进制</text>
    <text x="856" y="414" font-size="9" fill="#b45309">POST /rag/vectors/rank · POST /rag/vectors/rank-binary</text>
    <text x="856" y="436" font-weight="600">RAG 文档预处理</text>
    <text x="856" y="450" fill="#b45309">POST /rag/documents/prepare</text>
    <text x="856" y="474" font-weight="600">发布可观测性</text>
    <text x="856" y="488" fill="#b45309">GET /metrics · 连接池 · 分层计时</text>
  </g>

  <!-- delegation arrows -->
  <text x="796" y="316" font-size="10" fill="#b45309" text-anchor="end">按需确定性委派</text>
  <line x1="780" y1="324" x2="832" y2="324" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#rust-arrow)"/>
  <line x1="832" y1="386" x2="780" y2="386" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#rust-arrow)"/>
  <text x="796" y="378" font-size="10" fill="#b45309" text-anchor="end">校验通过的结果</text>
  <rect x="570" y="418" width="226" height="40" rx="7" fill="#fff7ed" stroke="#fdba74"/>
  <text x="783" y="433" font-size="9.5" fill="#b45309" text-anchor="end">超时 · 不可用 · 格式错误 · 结果分歧</text>
  <text x="783" y="449" font-size="10" fill="#92400e" text-anchor="end" font-weight="600">Python 回退始终权威</text>

  <!-- arrow runtime -> data -->
  <line x1="428" y1="510" x2="428" y2="536" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- local data layer -->
  <rect x="48" y="540" width="1104" height="120" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="64" y="558" font-size="10" letter-spacing="2" fill="#94a3b8">本地数据与可观测性 · PYTHON 所有</text>
  <g font-size="11.5" fill="#334155" text-anchor="middle">
    <rect x="64" y="572" width="148" height="48" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="138" y="590" fill="#047857" font-weight="600">SQLite 向量 RAG</text>
    <text x="138" y="606" font-size="10" fill="#059669">BM25 混合检索 · 引用</text>
    <rect x="252" y="572" width="148" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="326" y="590">长期记忆</text>
    <text x="326" y="606" font-size="10" fill="#94a3b8">分域 · 经确认</text>
    <rect x="440" y="572" width="148" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="514" y="590">语义缓存 · JSON + f64le BLOB</text>
    <text x="514" y="606" font-size="10" fill="#94a3b8">分域 · 质量门控</text>
    <rect x="628" y="572" width="148" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="702" y="590">链路追踪 · Span 树</text>
    <text x="702" y="606" font-size="10" fill="#94a3b8">瀑布图 · /metrics</text>
    <rect x="816" y="572" width="148" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="890" y="590">请求队列 · DLQ</text>
    <text x="890" y="606" font-size="10" fill="#94a3b8">重试 · 背压</text>
    <rect x="1004" y="572" width="148" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1078" y="590">预算</text>
    <text x="1078" y="606" font-size="10" fill="#94a3b8">每日账本</text>
  </g>
  <text x="600" y="648" font-size="11" fill="#047857" text-anchor="middle" font-weight="600">持久化始终由 Python 所有 · Rust 不读取 SQLite</text>

  <!-- external boundary -->
  <line x1="48" y1="720" x2="1152" y2="720" stroke="#cbd5e1" stroke-dasharray="6 6"/>
  <text x="48" y="750" font-size="12" fill="#64748b">数据默认不出端 · 只有显式调用跨过这条线</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="690" y="732" width="150" height="32" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="765" y="753" fill="#1d4ed8">DeepSeek API</text>
    <rect x="852" y="732" width="140" height="32" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="922" y="753" fill="#1d4ed8">Tavily 搜索</text>
    <rect x="1004" y="732" width="148" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1078" y="753" fill="#334155">Ollama / 边缘推理</text>
  </g>

  <!-- footer -->
  <text x="600" y="820" font-size="10" fill="#94a3b8" text-anchor="middle">4.1.1：Trace 加载韧性 · 单一 UI 源码 · Rust 主运行时关闭</text>
</svg>
